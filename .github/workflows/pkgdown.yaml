
name: 'build and deploy documentation website on github pages'

on:
  push:
    branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]
  release:
    types: [published]
  workflow_dispatch:

permissions: read-all

# a) The "pages-build-deployment" workflow gh action is able to publish from the docs folder of main branch if you already locally built the pkgdown site in development and main branches.
# b) alternatively, the workflow called 'build and deploy documentation website on github pages' in pkgdown.yaml, would be the approach to use if building the site via gh actions, not locally, and deploying from the gh-pages branch, \ (root) folder.
# Do not need both, so disable or delete the one not being used and configure the repo to publish from the correct branch and folder.

# This Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help

jobs:
  build-deploy-pkgdown:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ github.token }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.3.0

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
      # do specific steps here to avoid build_llms(), since the pkgdown:: wrapper function now also includes build_llms() which takes much too long for this large website.
        run: |
          pkg <- pkgdown::as_pkgdown(".")
          pkgdown::init_site(pkg)
          pkgdown::build_home(pkg)
          pkgdown::build_reference(pkg)
          pkgdown::build_articles(pkg)
          pkgdown::build_news(pkg)
          pkgdown::build_sitemap(pkg)

        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        # if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          clean: true
          branch: gh-pages
          target-folder: \

